<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Notatki</title></head>
<body>
<nav>
    <a th:href="@{/notes}">Notatki</a>
    <a th:href="@{/notes/new}">Nowa</a>
    <a th:href="@{/profile}">Profil</a>
    <a th:href="@{/admin}">Admin</a>
    <form method="post" th:action="@{/logout}" style="display:inline">
        <button type="submit">Wyloguj</button>
    </form>
</nav>
<hr/>
<h2>Moje notatki</h2>
<form method="get" th:action="@{/notes/search}">
    <input name="q" placeholder="szukaj po tytule" th:value="${query}"/>
    <button type="submit">Szukaj</button>
</form>
<ul>
    <li th:each="n : ${notes}">
        <a th:href="@{'/notes/' + ${n.id}}" th:text="${n.title}">tytul</a>
        <span style="color:#777" th:text="'(id=' + ${n.id} + ', owner=' + ${n.owner.id} + ')'"></span>
    </li>
</ul>
<h3>Import z URL</h3>
<form method="post" th:action="@{/notes/import}">
    <input name="url" placeholder="https://..."/>
    <button type="submit">Importuj</button>
</form>
</body>
</html>
