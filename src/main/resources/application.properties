spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notesdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notes}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notes}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.cache=true

# [HARDENING A02/A10] brak sladu stosu i szczegolow bledu w odpowiedzi
server.error.include-stacktrace=never
server.error.include-message=never

# [HARDENING A04] flagi ciasteczka sesyjnego (Secure ustawiane automatycznie pod HTTPS)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

app.jwt.secret=${APP_JWT_SECRET:dev-only-insecure-signing-key-change-me-please-0123456789}
app.jwt.issuer=${APP_JWT_ISSUER:notes-app}
app.jwt.audience=${APP_JWT_AUDIENCE:notes-app-clients}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
