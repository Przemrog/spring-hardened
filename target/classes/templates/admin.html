<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Panel administratora</title></head>
<body>
<a th:href="@{/notes}">&larr; Notatki</a>
<h2>Panel administratora - wszystkie notatki</h2>
<p style="color:#777">W wariancie bazowym brak kontroli roli - dostepny dla kazdego zalogowanego.</p>
<table border="1" cellpadding="4">
    <tr><th>id</th><th>tytul</th><th>wlasciciel</th></tr>
    <tr th:each="n : ${notes}">
        <td th:text="${n.id}"></td>
        <td th:text="${n.title}"></td>
        <td th:text="${n.owner.email}"></td>
    </tr>
</table>
</body>
</html>
